kcp_version: "0.6"
project: "The_Merkabit"
description: >
  Foundation repository for the Merkabit architecture: two counter-rotating spinors
  locked into a standing wave on an Eisenstein hexagonal lattice. Provides five
  native gates (R, S, T, Z6, Z62), built-in three-layer error correction, and
  numerical verification of α=1/137 derivation, PSL(2,7) geometry, spinor dynamics,
  and error-correction properties.
version: "1.0"
created: "2026-04-06"
maintainer: "Selina Stenberg"

